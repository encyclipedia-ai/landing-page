# Build the Next.js static site and deploy it to GitHub Pages.
#
# Triggered on every push to main. The build output is `./out/` (because
# next.config.ts sets `output: "export"`), which is what gets uploaded
# verbatim as the Pages artifact.
#
# Custom domain (encyclipedia.ai) is configured via public/CNAME, which is
# copied into ./out/ during export so GitHub Pages keeps the domain
# binding across rebuilds.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build
        env:
          # Override the default invite URL at build time if you ever want a
          # different form for production deploys without changing code.
          NEXT_PUBLIC_INVITE_FORM_URL: ${{ vars.NEXT_PUBLIC_INVITE_FORM_URL }}

      - name: Disable Jekyll
        # GitHub Pages otherwise tries to run files through Jekyll, which
        # ignores files/folders starting with `_` (Next emits `_next/`).
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
